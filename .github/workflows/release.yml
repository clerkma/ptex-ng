name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write
  actions: read

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Wait for build and download artifacts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SHA=$(git rev-parse HEAD)
          echo "Looking for successful blade-build-bin run on $SHA..."

          for i in $(seq 1 60); do
            RUN_ID=$(gh run list \
              --workflow=blade-build-bin.yml \
              --commit="$SHA" \
              --status=success \
              --json databaseId \
              -q '.[0].databaseId')

            if [ -n "$RUN_ID" ]; then
              echo "Found successful run: $RUN_ID"
              gh run download "$RUN_ID" --dir artifacts/
              exit 0
            fi

            echo "Waiting for build workflow... attempt $i/60"
            sleep 30
          done

          echo "::error::Build workflow did not complete within 30 minutes"
          exit 1

      - name: Prepare per-platform archives
        run: |
          mkdir -p release

          for target in linux-x64 linux-arm64 macos-universal; do
            install -D -m 755 release/aptex "release/aptex-${target}"
            tar czf "release/aptex-${target}.tar.gz" -C release aptex
          done
          rm release/aptex

          cp artifacts/aptex-windows-x64.exe release/aptex.exe
          (cd release && zip aptex-windows-x64.zip aptex.exe)
          rm release/aptex.exe

      - name: Prepare TDS archive
        run: |
          install -D -m 755 artifacts/aptex-linux-x64 tds/bin/x86_64-linux/aptex
          install -D -m 755 artifacts/aptex-linux-arm64 tds/bin/aarch64-linux/aptex
          install -D -m 755 artifacts/aptex-macos-universal tds/bin/universal-darwin/aptex
          install -D -m 755 artifacts/aptex-windows-x64.exe tds/bin/x86_64-windows/aptex.exe
          (cd tds && zip -r ../release/aptex-tds.zip bin/)

      - name: Generate checksums
        run: (cd release && sha256sum * > checksums.txt)

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          gh release create "$TAG" \
            --title "aptex $TAG" \
            --generate-notes \
            --prerelease \
            release/*
